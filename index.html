<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam Cuica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: white;
        }

        .sidebar {
            width: 180px;
            padding: 20px 0;
            background: white;
        }

        .site-title {
            font-size: 18px;
            font-weight: bold;
            padding: 10px 0 10px 6px;
            margin-bottom: 10px;
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            margin: 0;
        }

        .nav-link {
            display: block;
            padding: 8px 6px;
            color: black;
            text-decoration: none;
            font-size: 15px;
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .nav-link:hover {
            background-color: #6ba7eb67;
        }

        .nav-link.active {
            background-color: #6ba6eb;
        }

        .container {
            display: flex;
        }

        .content {
            flex: 1;
            padding: 20px;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #6ba6eb;
            border-radius: 50%;
            margin-left: 10px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        .loading {
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="site-title">ancuica.com</div>
            <ul class="nav-list">
                <li class="nav-item"><a data-page="home" class="nav-link active">home</a></li>
                <li class="nav-item"><a data-page="about" class="nav-link">about</a></li>
                <li class="nav-item"><a data-page="blog" class="nav-link">blog</a></li>
            </ul>
        </nav>

        <main class="content" id="main-content">
            <h1>Welcome <span class="cursor"></span></h1>
            <p>This is your main content area.</p>
        </main>
    </div>

    <script>
        // Function to load page content
        async function loadPage(pageName) {
            const contentArea = document.getElementById('main-content');
            
            // Show loading state
            contentArea.innerHTML = '<p class="loading">Loading...</p>';
            
            try {
                // Fetch the HTML file
                const response = await fetch(`${pageName}.html`);
                
                if (!response.ok) {
                    throw new Error('Page not found');
                }
                
                const html = await response.text();
                contentArea.innerHTML = html;
            } catch (error) {
                contentArea.innerHTML = `<h1>Error</h1><p>Could not load ${pageName}.html</p>`;
            }
        }

        // Add click handlers to navigation links
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                
                // Update active state
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                
                // Get page name from data attribute
                const pageName = this.getAttribute('data-page');
                
                // Load the page
                loadPage(pageName);
            });
        });
    </script>
</body>
</html>

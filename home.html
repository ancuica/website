<style>
    .weather-card {
        background: #f5f5f5;
        border-radius: 8px;
        padding: 20px;
        margin-top: 20px;
        max-width: 400px;
    }

    .weather-card h2 {
        margin-bottom: 15px;
        color: #333;
    }

    .weather-info {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .temperature {
        font-size: 48px;
        font-weight: bold;
        color: #ff6b6b;
    }

    .weather-details {
        flex: 1;
    }

    .weather-details p {
        margin: 5px 0;
        color: #666;
    }

    .location-info {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid #ddd;
        color: #666;
        font-size: 14px;
    }

    .loading {
        color: #999;
        font-style: italic;
    }

    .cursor {
        display: inline-block;
        width: 8px;
        height: 8px;
        background-color: #ff6b6b;
        border-radius: 50%;
        margin-left: 10px;
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
    }
</style>

<h1>Welcome <span class="cursor"></span></h1>
<div id="location-weather">
    <p class="loading">Getting your location from IP...</p>
</div>

<script>
    // Function to get weather data
    async function getWeather(lat, lon) {
        try {
            const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=auto`);
            const data = await response.json();
            return data;
        } catch (error) {
            console.error('Error fetching weather:', error);
            return null;
        }
    }

    // Function to get location from IP address
    async function getLocationFromIP() {
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            return {
                city: data.city || 'Unknown',
                region: data.region || '',
                country: data.country_name || '',
                lat: data.latitude,
                lon: data.longitude,
                ip: data.ip
            };
        } catch (error) {
            console.error('Error fetching location from IP:', error);
            return null;
        }
    }

    // Weather code descriptions
    function getWeatherDescription(code) {
        const descriptions = {
            0: 'Clear sky',
            1: 'Mainly clear',
            2: 'Partly cloudy',
            3: 'Overcast',
            45: 'Foggy',
            48: 'Foggy',
            51: 'Light drizzle',
            53: 'Moderate drizzle',
            55: 'Dense drizzle',
            61: 'Slight rain',
            63: 'Moderate rain',
            65: 'Heavy rain',
            71: 'Slight snow',
            73: 'Moderate snow',
            75: 'Heavy snow',
            77: 'Snow grains',
            80: 'Slight rain showers',
            81: 'Moderate rain showers',
            82: 'Violent rain showers',
            85: 'Slight snow showers',
            86: 'Heavy snow showers',
            95: 'Thunderstorm',
            96: 'Thunderstorm with hail',
            99: 'Thunderstorm with hail'
        };
        return descriptions[code] || 'Unknown';
    }

    // Function to display weather
    async function displayWeather() {
        const weatherDiv = document.getElementById('location-weather');
        
        weatherDiv.innerHTML = '<p class="loading">Getting your location from IP...</p>';

        // Get location from IP
        const location = await getLocationFromIP();
        
        if (!location || !location.lat || !location.lon) {
            weatherDiv.innerHTML = '<p>Unable to determine your location.</p>';
            return;
        }

        // Get weather data
        const weather = await getWeather(location.lat, location.lon);

        if (weather && weather.current) {
            const temp = Math.round(weather.current.temperature_2m);
            const feelsLike = Math.round(weather.current.apparent_temperature);
            const humidity = weather.current.relative_humidity_2m;
            const windSpeed = Math.round(weather.current.wind_speed_10m);
            const description = getWeatherDescription(weather.current.weather_code);

            const locationStr = `${location.city}, ${location.region}${location.country ? ', ' + location.country : ''}`;

            weatherDiv.innerHTML = `
                <div class="weather-card">
                    <h2>Your Local Weather</h2>
                    <div class="weather-info">
                        <div class="temperature">${temp}°C</div>
                        <div class="weather-details">
                            <p><strong>${description}</strong></p>
                            <p>Feels like: ${feelsLike}°C</p>
                            <p>Humidity: ${humidity}%</p>
                            <p>Wind: ${windSpeed} km/h</p>
                        </div>
                    </div>
                    <div class="location-info">
                        <p>📍 ${locationStr}</p>
                        <p>🌐 IP: ${location.ip}</p>
                    </div>
                </div>
            `;
        } else {
            weatherDiv.innerHTML = '<p>Unable to fetch weather data.</p>';
        }
    }

    // Load weather on page load
    displayWeather();
</script>
